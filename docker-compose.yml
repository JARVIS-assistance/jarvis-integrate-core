services:
  jarvis-core:
    build:
      context: .
      dockerfile: Dockerfile
      target: core
    container_name: jarvis-core
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      JARVIS_CORE_DB: /app/data/jarvis_core.db
    ports:
      - "${JARVIS_CORE_PORT:-3010}:8000"
    volumes:
      - jarvis_core_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  jarvis-controller:
    build:
      context: .
      dockerfile: Dockerfile
      target: controller
    container_name: jarvis-controller
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      JARVIS_CORE_URL: http://jarvis-core:8000
      JARVIS_GATEWAY_URL: http://jarvis-gateway:8002
    ports:
      - "${JARVIS_CONTROLLER_PORT:-3011}:8001"
    depends_on:
      jarvis-core:
        condition: service_healthy
      jarvis-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  jarvis-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: jarvis-gateway
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      JARVIS_GATEWAY_DB: /app/data/jarvis_gateway.db
      JARVIS_GATEWAY_RATE_LIMIT: "${JARVIS_GATEWAY_RATE_LIMIT:-60}"
      JARVIS_GATEWAY_RATE_WINDOW: "${JARVIS_GATEWAY_RATE_WINDOW:-60}"
    ports:
      - "${JARVIS_GATEWAY_PORT:-3012}:8002"
    volumes:
      - jarvis_gateway_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  jarvis-ai-workbench:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-workbench
    container_name: jarvis-ai-workbench
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${JARVIS_AI_WORKBENCH_PORT:-3013}:8010"
    volumes:
      - ./jarvis-ai-workbench/config:/app/jarvis-ai-workbench/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  jarvis_core_data:
  jarvis_gateway_data:
